<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#166534">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Global Corporate Club 2026</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="css/main.css?v=20260527s">
  <style>
    :root {
      --accent: #8A4FFF; --accent-light: rgba(138,79,255,0.12);
      --accent-dark: #6E00FF; --accent-text: #C49DFF;
      --bg: #080608; --bg-secondary: #0D0818; --surface: #130E22;
      --border: rgba(138,79,255,0.2);
      --text: #F0EEF8; --text-secondary: rgba(240,238,248,0.6); --text-hint: rgba(240,238,248,0.3);
      --tab-active-color: #8A4FFF; --tab-inactive-color: rgba(240,238,248,0.3); --tab-bg: #0D0818;
    }
    body { background: repeating-linear-gradient(125deg,transparent 0px,transparent 90px,rgba(110,0,255,0.04) 90px,rgba(110,0,255,0.04) 92px,transparent 92px,transparent 180px),radial-gradient(ellipse at 40% 20%,#1A0D35 0%,#0D0818 45%,#050408 100%) fixed !important; color: #F0EEF8 !important; }
  </style>
</head>
<body>

<!-- ═══ HEADER ════════════════════════════ -->
<header class="app-header">
  <div class="header-brand">
    <div>
      <div class="header-organizer">GreenCode International</div>
      <div class="header-title" id="header-title">Global Corporate Club 2026</div>
      <div class="header-sub"   id="header-sub">2–5 июня · Северный Кипр</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;position:relative;z-index:10">
    <button class="lang-toggle" id="lang-btn" onclick="App.toggleLang()" aria-label="Switch language">EN</button>
    <button class="faq-trigger" onclick="App.openFAQ()" aria-label="Вопросы и ответы">?</button>
  </div>
</header>

<!-- ═══ CONTENT ══════════════════════════ -->
<main class="main-content">
  <div id="tab-chat"       class="tab-panel hidden"></div>
  <div id="tab-today"      class="tab-panel"></div>
  <div id="tab-program"    class="tab-panel hidden"></div>
  <div id="tab-location"   class="tab-panel hidden"></div>
  <div id="tab-excursion"  class="tab-panel hidden"></div>
  <div id="tab-exhibitors" class="tab-panel hidden"></div>
</main>

<!-- ═══ TAB BAR (bottom) ════════════════ -->
<nav class="tab-bar" id="tab-bar">
  <button class="tab"        data-tab="chat"       onclick="App.switchTab('chat', this)">
    <span class="tab-icon">💬</span><span class="tab-label" data-ru="Чат"        data-en="Chat">Чат</span>
  </button>
  <button class="tab active" data-tab="today"      onclick="App.switchTab('today', this)">
    <span class="tab-icon">☀️</span><span class="tab-label" data-ru="Сегодня"    data-en="Today">Сегодня</span>
  </button>
  <button class="tab"        data-tab="program"    onclick="App.switchTab('program', this)">
    <span class="tab-icon">📅</span><span class="tab-label" data-ru="Программа"  data-en="Schedule">Программа</span>
  </button>
  <button class="tab"        data-tab="location"   onclick="App.switchTab('location', this)">
    <span class="tab-icon">🏨</span><span class="tab-label" data-ru="Локация"    data-en="Location">Локация</span>
  </button>
  <button class="tab"        data-tab="excursion"  onclick="App.switchTab('excursion', this)">
    <span class="tab-icon">🏛</span><span class="tab-label" data-ru="Экскурсия"  data-en="Excursion">Экскурсия</span>
  </button>
  <button class="tab"        data-tab="exhibitors" onclick="App.switchTab('exhibitors', this)">
    <span class="tab-icon">🤝</span><span class="tab-label" data-ru="Экспоненты" data-en="Exhibitors">Экспоненты</span>
  </button>
</nav>

<!-- ═══ FAB: ПОМОЩЬ ══════════════════════ -->
<button class="fab-help" onclick="App.callHelp()" aria-label="Нужна помощь">📞</button>

<!-- ═══ MODAL: FAQ ═══════════════════════ -->
<div class="modal-overlay" id="modal-faq" onclick="if(event.target===this)App.closeFAQ()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h2>Вопросы и ответы</h2>
    <input class="faq-search" id="faq-search" type="text"
      placeholder="🔍  Найти ответ..."
      oninput="App.searchFAQ(this.value)">
    <div id="faq-list"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/data.js?v=20260527s"></script>
<script src="js/app.js?v=20260527s"></script>
</body>
</html>
