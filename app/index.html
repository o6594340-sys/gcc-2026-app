<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#166534">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Global Corporate Club 2026</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

<!-- ═══ HEADER ════════════════════════════ -->
<header class="app-header">
  <div class="header-brand">
    <img id="header-logo" class="header-logo hidden" src="" alt="logo">
    <div>
      <div class="header-title" id="header-title">Global Corporate Club 2026</div>
      <div class="header-sub"   id="header-sub">2–5 июня · Северный Кипр</div>
    </div>
  </div>
  <button class="faq-trigger" onclick="App.openFAQ()" aria-label="Вопросы и ответы">?</button>
</header>

<!-- ═══ TAB BAR ═══════════════════════════ -->
<nav class="tab-bar" id="tab-bar">
  <button class="tab active" data-tab="today"      onclick="App.switchTab('today', this)">☀️ Сегодня</button>
  <button class="tab"        data-tab="program"    onclick="App.switchTab('program', this)">📅 Программа</button>
  <button class="tab"        data-tab="location"   onclick="App.switchTab('location', this)">🏨 Локация</button>
  <button class="tab"        data-tab="excursion"  onclick="App.switchTab('excursion', this)">🏛 Экскурсия</button>
  <button class="tab"        data-tab="exhibitors" onclick="App.switchTab('exhibitors', this)">🤝 Участники</button>
</nav>

<!-- ═══ CONTENT ══════════════════════════ -->
<main class="main-content">
  <div id="tab-today"      class="tab-panel"></div>
  <div id="tab-program"    class="tab-panel hidden"></div>
  <div id="tab-location"   class="tab-panel hidden"></div>
  <div id="tab-excursion"  class="tab-panel hidden"></div>
  <div id="tab-exhibitors" class="tab-panel hidden"></div>
</main>

<!-- ═══ FAB: ПОМОЩЬ ══════════════════════ -->
<button class="fab-help" onclick="App.callHelp()" aria-label="Нужна помощь">💬</button>

<!-- ═══ MODAL: FAQ ═══════════════════════ -->
<div class="modal-overlay" id="modal-faq" onclick="if(event.target===this)App.closeFAQ()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h2>Вопросы и ответы</h2>
    <input class="faq-search" id="faq-search" type="text"
      placeholder="🔍  Найти ответ..."
      oninput="App.searchFAQ(this.value)">
    <div id="faq-list"></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
