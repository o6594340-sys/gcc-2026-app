<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Generate Cover</title></head>
<body style="margin:0;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px">
<canvas id="c" width="640" height="360" style="border:1px solid #333"></canvas>
<button onclick="download()" style="padding:12px 32px;font-size:16px;background:#166534;color:#fff;border:none;border-radius:8px;cursor:pointer">Скачать PNG</button>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');

// Background gradient
const g = ctx.createLinearGradient(0, 0, 640, 360);
g.addColorStop(0, '#0f3d20');
g.addColorStop(1, '#166534');
ctx.fillStyle = g;
ctx.fillRect(0, 0, 640, 360);

// Subtle grid pattern
ctx.strokeStyle = 'rgba(255,255,255,0.04)';
ctx.lineWidth = 1;
for (let x = 0; x < 640; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,360); ctx.stroke(); }
for (let y = 0; y < 360; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(640,y); ctx.stroke(); }

// Decorative circle
ctx.beginPath();
ctx.arc(540, 60, 120, 0, Math.PI*2);
ctx.fillStyle = 'rgba(255,255,255,0.04)';
ctx.fill();

ctx.beginPath();
ctx.arc(540, 60, 80, 0, Math.PI*2);
ctx.fillStyle = 'rgba(255,255,255,0.05)';
ctx.fill();

// Organizer
ctx.fillStyle = 'rgba(255,255,255,0.6)';
ctx.font = '600 13px Arial';
ctx.letterSpacing = '2px';
ctx.fillText('GREENCODE INTERNATIONAL', 48, 110);

// Main title
ctx.fillStyle = '#ffffff';
ctx.font = 'bold 52px Arial';
ctx.fillText('Global Corporate', 48, 180);
ctx.fillText('Club 2026', 48, 240);

// Divider
ctx.fillStyle = 'rgba(255,255,255,0.3)';
ctx.fillRect(48, 265, 200, 2);

// Details
ctx.fillStyle = 'rgba(255,255,255,0.75)';
ctx.font = '500 18px Arial';
ctx.fillText('2–5 июня · Северный Кипр', 48, 300);

// Leaf emoji area
ctx.font = '64px Arial';
ctx.fillText('🌿', 540, 310);

function download() {
  const a = document.createElement('a');
  a.download = 'gcc2026-cover.png';
  a.href = c.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
